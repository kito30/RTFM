name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - backdoor/**
      - backdoor.Tests/**
      - backdoor.slnx
      - .github/workflows/backend-ci-cd.yml
  pull_request:
    branches:
      - main
    paths:
      - backdoor/**
      - backdoor.Tests/**
      - backdoor.slnx
      - .github/workflows/backend-ci-cd.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  SOLUTION_PATH: backdoor.slnx
jobs:
  ci:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run backend tests from solution
        run: dotnet test --no-restore

  cd:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish backend
        run: dotnet publish backdoor/backdoor.csproj --configuration Release --output ./dll

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backdoor-publish
          path: ./dll
          if-no-files-found: error