name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - backdoor/**
      - backdoor.Tests/**
      - frontdoor/**
      - backdoor.slnx
      - .github/workflows/backend-ci-cd.yml
  pull_request:
    branches:
      - main
    paths:
      - backdoor/**
      - backdoor.Tests/**
      - frontdoor/**
      - backdoor.slnx
      - .github/workflows/backend-ci-cd.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  SOLUTION_PATH: backdoor.slnx
jobs:
  tests:
    name: Backend and Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run backend tests from solution
        run: dotnet test --no-restore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontdoor/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontdoor

      - name: Run frontend tests
        run: npm test -- --ci --watchAll=false
        working-directory: frontdoor

  cd:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish backend
        run: dotnet publish backdoor/backdoor.csproj --configuration Release --output ./dll

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backdoor-publish
          path: ./dll
          if-no-files-found: error