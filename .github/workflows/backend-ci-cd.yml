name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - backdoor/**
      - .github/workflows/backend-ci-cd.yml
  pull_request:
    branches:
      - main
    paths:
      - backdoor/**
      - .github/workflows/backend-ci-cd.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_PATH: backdoor/backdoor.csproj
  BUILD_CONFIGURATION: Release

jobs:
  ci:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore $PROJECT_PATH

      - name: Build
        run: dotnet build $PROJECT_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Run tests (if any test projects exist)
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -type f -name "*Tests.csproj")

          if [ ${#test_projects[@]} -eq 0 ]; then
            echo "No test projects found. Skipping test step."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            echo "Running tests for: $project"
            dotnet test "$project" --configuration $BUILD_CONFIGURATION --no-build --verbosity normal
          done

  cd:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish backend
        run: dotnet publish $PROJECT_PATH --configuration $BUILD_CONFIGURATION --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backdoor-publish
          path: ./publish
          if-no-files-found: error